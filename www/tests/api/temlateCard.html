<!doctype html>
<html lang="ru">
<head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
</head>
<body>
    <style>
        .bodyDiv {
            width: 100%;
        }
        .tblBody {
            width: 100%;
            height: 400px;
            font-size: 12pt;
            table-layout: fixed;
            margin: 15px;
            font-family: 'Roboto',Arial,sans-serif;
        }
        .tblBody thead tr td {
            text-align:  center;
            width: 100%;
            font-weight: bold;
        }
        .tblSelected {
            width: 100%;
            height: 100%;
        }
        .tblSelected td {
            padding: 1px;
        }
        .ceilButton {
            display: flex;
            width: 100%;
            height: 100%;
            background-color: #f0f0f0;
            border: none;
            border-radius: 5px;
            color: #000000;
            text-align:  center;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .ceilButton_active {
            background-color: #ffeb3b;
        }
        #Results td {
            text-align:  center;
            align-items: center;
            justify-content: center;
        }

        @media screen and (max-width : 900px) {
            .tblBody {
                margin: 0;
                font-size: 10pt;
            }
        }
        @media screen and (max-width : 500px) {
            .tblBody {
                width: 600px;
            }
            .bodyDiv {
                overflow-x: scroll;
            }
        }

    </style>

    <script>
        $(document).ready(function() {
            $.ajax({
                url: "http://artline.city/www/api/",
                headers: {
                    'Method': 'ConstructorCalc',
                    'Content-Type': 'application/json'
                },
                type: "POST",
                cache: false,
                dataType: 'json',
                async: true,
                success: function(response) {
                    if(response.Msg) {
                        console.log(response.Msg);
                        return;
                    }
                    if(response.Data) {
                        addCeilButton('Materials', response.Data.Materials);
                        addCeilButton('Sizes', response.Data.Sizes);
                        addCeilButton('Colors', response.Data.Colors);
                        addCeilQuantitys(response.Data.Quantitys);
                    }
                },
                error: function () {
                    console.log('что-то не так!');
                }
            });
        });

        function addCeilButton(tableName, data) {
            let element = document.getElementById(tableName);
            if(!element)
                return;
            deleteFooterDOM(element);
            let tbody = document.createElement('tbody');
            element.appendChild(tbody);
            for(let i in data) {
                let tr = document.createElement('tr');
                let td = document.createElement('td');
                tr.appendChild(td);
                let div = document.createElement('div');
                div.setAttribute('class', 'ceilButton');
                div.setAttribute('onclick', 'selectedCeilButton(this, "' + data[i].value + '", "' + tableName + '")');
                div.appendChild(document.createTextNode(data[i].text));
                td.appendChild(div);
                tbody.appendChild(tr);
            }
        }

        function selectedCeilButton(e, val, tableName) {
            let element = document.getElementById(tableName);
            let frm = document.getElementById('frm' + tableName);
            if(!element || !frm)
                return;
            frm.value = "";
            let arrActive = element.getElementsByClassName('ceilButton_active');
            for(let i in arrActive) {
                if(arrActive[i].classList) {
                    arrActive[i].classList.remove('ceilButton_active');
                }
            }
            e.classList.add('ceilButton_active');
            frm.value = val;
            startCalc();
        }
        
        function addCeilQuantitys(data) {
            let element = document.getElementById('Quantitys');
            let rslt = document.getElementById('Results');
            let dvQuantitys = document.getElementById('dvQuantitys');
            if(!element || !dvQuantitys)
                return;
            deleteFooterDOM(element);
            deleteFooterDOM(rslt);
            let tbody = document.createElement('tbody');
            let tbodyRslt = document.createElement('tbody');
            element.appendChild(tbody);
            rslt.appendChild(tbodyRslt);
            for(let i in data) {
                var tr = document.createElement('tr');
                var td = document.createElement('td');
                tr.appendChild(td);
                let div = document.createElement('div');
                div.setAttribute('class', 'ceilButton');
                div.appendChild(document.createTextNode(data[i].text));
                td.appendChild(div);
                tbody.appendChild(tr);

                let inp = document.createElement('input');
                inp.setAttribute('type', 'hidden');
                inp.setAttribute('value', data[i].value);
                inp.setAttribute('name', 'dataQuantitys');
                dvQuantitys.appendChild(inp);

                var tr = document.createElement('tr');
                var td = document.createElement('td');
                tr.appendChild(td);
                let lbl = document.createElement('label');
                lbl.setAttribute('id', 'Results' + data[i].value);
                lbl.appendChild(document.createTextNode('0.00р'));
                td.appendChild(lbl);
                tbodyRslt.appendChild(tr);
            }
        }
        
        function startCalc() {
            let list = document.getElementsByName('dataQuantitys');
            for(let i in list) {
                if(list[i].value)
                    calc(list[i].value)
            }
        }

        function calc(quantity = 0) {
            let elem = document.getElementById('Results' + quantity);
            if(!elem)
                return;
            removeAllTextNodes(elem);
            elem.appendChild(document.createTextNode('0.00р'));
            let send = {
                'p_cir': quantity,
                'p_size': document.getElementById('frmSizes').value,
                'p_color_1': document.getElementById('frmColors').value,
                'p_mat_1': document.getElementById('frmMaterials').value,
                'FormId': document.getElementById('FormId').value
            }
            if(!send.p_cir || !send.FormId || !send.p_color_1 || !send.p_mat_1 || !send.p_size)
                return;

            $.ajax({
                url: "http://artline.city/www/api/",
                headers: {
                    'Method': 'FreeCalc',
                    'Content-Type': 'application/json'
                },
                type: "POST",
                data: JSON.stringify(send),
                cache: false,
                dataType: 'json',
                async: true,
                success: function(response) {
                    if(!response.Msg && response.Data) {
                        let str_cost = response.Data + "р";
                        removeAllTextNodes(elem);
                        elem.appendChild(document.createTextNode(str_cost));
                    }
                    if(response.Msg) {
                        console.log(response.Msg);
                    }
                },
                error: function () {
                    console.log('что-то не так!');
                }
            });
        }

        function removeAllTextNodes(node) {
            if(!node)
                return;
            if (node.nodeType === 3) {
                node.parentNode.removeChild(node);
            } else if (node.childNodes) {
                for (var i = node.childNodes.length; i--;) {
                    removeAllTextNodes(node.childNodes[i]);
                }
            }
        }

        function deleteFooterDOM(parent, element) {
            if(parent == null)
                parent = document;
            var all = parent.getElementsByTagName("*");

            var index = -1;

            if(element == null)
                index = 0;

            var i = all.length - 1;
            while(all[i] != element && i >= 0) {
                remove(all[i]);
                i--;
            }
        }

        //удаление элемента
        function remove(elem) {
            return elem.parentNode ? elem.parentNode.removeChild(elem) : elem;
        }
        
    </script>

    <input type="hidden" id="FormId" name="FormId" value="1607">
    <input type="hidden" id="frmMaterials" name="frmMaterials" value="">
    <input type="hidden" id="frmSizes" name="frmSizes" value="">
    <input type="hidden" id="frmColors" name="frmColors" value="">

    <div id="dvQuantitys">

    </div>

    <div class="bodyDiv"><table class="tblBody">
        <thead>
            <tr>
                <td>Бумага</td>
                <td>Размер</td>
                <td>Краски</td>
                <td>Тираж</td>
                <td>Стоимость</td>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><table id="Materials" class="tblSelected"></table></td>
                <td><table id="Sizes" class="tblSelected"></table></td>
                <td><table id="Colors" class="tblSelected"></table></td>
                <td><table id="Quantitys" class="tblSelected"></table></td>
                <td><table id="Results" class="tblSelected"></table></td>
            </tr>
        </tbody>
    </table></div>
</body>
</html>
